<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双人跑酷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;overflow:hidden}
canvas{display:block;border:1px solid #333}
#hud{display:flex;gap:30px;color:#fff;font-size:13px;margin-bottom:4px}
#hud span{background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:6px}
#p1{color:#5bf}#p2{color:#fb5}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;color:#fff;background:rgba(0,0,0,0.8);padding:16px 32px;border-radius:10px;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:10;text-align:center;width:max-content;max-width:80vw;white-space:pre-line}
</style>
</head>
<body>
<div id="hud">
  <span id="p1">P1: A/D 移动 | W 二段跳</span>
  <span id="p2">P2: ↑ 跳跃 | ↓ 快速下落</span>
  <span>❤️ x<b id="lives">3</b></span>
  <span>🪙 <b id="coins">0</b></span>
  <span>👤 P1+P2</span>
  <span id="level-tag" style="color:#fd0">第 1 关</span>
</div>
<canvas id="game"></canvas>
<div id="msg"></div>
<script>
/* ============================================
 * 常量 —— 调参区
 * ============================================ */
const CANVAS_W = 800, CANVAS_H = 500;       // 画布
const GRAVITY      = 0.55;   // 重力加速度（px/frame²）
const JUMP_V       = -10.5;  // 一段跳初速度
const DOUBLE_JUMP_V= -9.0;   // 二段跳初速度
const MOVE_SPEED   = 2.0;    // 水平移速（px/frame）
const FAST_FALL    = 0.7;    // 快速下落额外加速度
const GROUND_Y     = 430;    // 地面 y 坐标
const CHAR_W = 28, CHAR_H = 38; // 角色尺寸

/* ============================================
 * 画布
 * ============================================ */
const canvas = document.getElementById('game');
canvas.width = CANVAS_W; canvas.height = CANVAS_H;
const ctx = canvas.getContext('2d');

/* ============================================
 * 游戏状态
 * ============================================ */
let player = { x:60, y:GROUND_Y-CHAR_H, w:CHAR_W, h:CHAR_H, vx:0, vy:0, onGround:false, jumpsUsed:0, maxJumps:2 };
let cameraX = 0;
let lives = 3, coinsCollected = 0, deaths = 0;
let gameState = 'menu'; // menu | playing | win | dead | gameover
let deadTimer = 0, winTimer = 0;
let particles = [];

/* ============================================
 * 关卡数据 {x,y,w,h,type}
 * type: 'ground' | 'platform' | 'spike' | 'coin' | 'flag'
 * ============================================ */
/* ============================================
 * 关卡数据 —— 多关卡并存
 * 第一关：1 坑 + 1 平台 + 1 尖刺（教学关）
 * 第二关：2 坑 + 5 平台 + 2 尖刺（挑战关）
 * ============================================ */
const LEVELS = {
  1: {
    name: '第一关 · 教学',
    desc: '1 坑 + 1 平台 + 1 尖刺',
    width: 1500,
    grounds: [
      {x:0,   y:GROUND_Y, w:600, h:70, type:'ground'},
      {x:760, y:GROUND_Y, w:740, h:70, type:'ground'},
    ],
    platforms: [
      {x:620, y:380, w:160, h:16, type:'platform'},
    ],
    spikes: [
      {x:400, y:GROUND_Y-20, w:40, h:20},
    ],
    coins: [
      {x:200,y:380},{x:230,y:380},
      {x:680,y:360},{x:710,y:360},
      {x:900,y:380},{x:930,y:380},
    ],
    flag: {x:1420, y:GROUND_Y-80, w:10, h:80},
  },
  2: {
    name: '第二关 · 挑战',
    desc: '2 坑 + 5 平台 + 2 尖刺',
    width: 2200,
    grounds: [
      {x:0,   y:GROUND_Y, w:700, h:70, type:'ground'},
      {x:820, y:GROUND_Y, w:480, h:70, type:'ground'},
      {x:1500,y:GROUND_Y, w:400, h:70, type:'ground'},
      {x:1980,y:GROUND_Y, w:220, h:70, type:'ground'},
    ],
    platforms: [
      {x:700, y:380, w:140, h:16, type:'platform'},
      {x:920, y:360, w:100, h:16, type:'platform'},
      {x:1050,y:290, w:80,  h:16, type:'platform'},
      {x:1380,y:360, w:80,  h:16, type:'platform'},
      {x:1700,y:380, w:100, h:16, type:'platform'},
    ],
    spikes: [
      {x:400, y:GROUND_Y-20, w:40, h:20},
      {x:1750, y:GROUND_Y-20, w:40, h:20},
    ],
    coins: [
      {x:200,y:380},{x:230,y:380},
      {x:740,y:360},{x:770,y:360},
      {x:950,y:330},{x:980,y:330},
      {x:1070,y:270},{x:1090,y:270},
      {x:1400,y:340},{x:1420,y:340},
      {x:1620,y:380},{x:1650,y:380},
      {x:1730,y:360},
      {x:2020,y:380},{x:2050,y:380},{x:2080,y:380},
    ],
    flag: {x:2120, y:GROUND_Y-80, w:10, h:80},
  },
};

// 运行时关卡数据（由 loadLevel 填充）
let LEVEL_W = 1500;
let GROUNDS = [], PLATFORMS = [], SPIKES = [], COINS = [];
let FLAG = {x:1420, y:GROUND_Y-80, w:10, h:80};
let currentLevel = 1;
let menuSelection = 1;  // 菜单当前选中（1 或 2）
let winMenuSelection = 0;  // 胜利菜单：0=下一关, 1=回首页
let winMenuOptions = [];  // 胜利菜单可选动作：'next' | 'menu'

function loadLevel(id) {
  const lv = LEVELS[id];
  if (!lv) return;
  // 深拷贝数组避免污染原始数据
  GROUNDS = lv.grounds.map(o => Object.assign({}, o));
  PLATFORMS = lv.platforms.map(o => Object.assign({}, o));
  SPIKES = lv.spikes.map(o => Object.assign({}, o));
  COINS = lv.coins.map(o => Object.assign({}, o));
  FLAG = Object.assign({}, lv.flag);
  LEVEL_W = lv.width;
  currentLevel = id;
  // 更新 HUD 关卡标签
  const tag = document.getElementById('level-tag');
  if (tag) tag.textContent = '第 ' + id + ' 关';
  // 重置玩家到出生点
  player.x = 60; player.y = GROUND_Y - CHAR_H;
  player.vx = 0; player.vy = 0; player.jumpsUsed = 0;
  player.onGround = false;
  cameraX = 0;
  lives = 3; coinsCollected = 0; deaths = 0;
  gameState = 'playing';
}

/* ============================================
 * 输入
 * ============================================ */
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  e.preventDefault();
  // 菜单控制
  if (gameState === 'menu') {
    if (e.code === 'Digit1' || e.code === 'Numpad1') { loadLevel(1); keys[e.code] = false; return; }
    if (e.code === 'Digit2' || e.code === 'Numpad2') { loadLevel(2); keys[e.code] = false; return; }
    if (e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'KeyW' || e.code === 'KeyS') {
      menuSelection = menuSelection === 1 ? 2 : 1;
      keys[e.code] = false; return;
    }
    if (e.code === 'Enter' || e.code === 'Space') {
      loadLevel(menuSelection);
      keys[e.code] = false; return;
    }
  }
  // 通关后回菜单
  // 胜利菜单控制
  if (gameState === 'win') {
    if (e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'KeyW' || e.code === 'KeyS') {
      if (winMenuOptions.length > 1) {
        winMenuSelection = (winMenuSelection + 1) % winMenuOptions.length;
      }
      keys[e.code] = false; return;
    }
    if (e.code === 'Enter' || e.code === 'Space') {
      const action = winMenuOptions[winMenuSelection];
      document.getElementById('msg').style.opacity = '0';
      if (action === 'next') {
        loadLevel(currentLevel + 1);
      } else {
        gameState = 'menu';
      }
      keys[e.code] = false; return;
    }
    if (e.code === 'Digit1' && winMenuOptions.includes('next')) {
      document.getElementById('msg').style.opacity = '0';
      loadLevel(currentLevel + 1); keys[e.code] = false; return;
    }
    if (e.code === 'Digit2' && winMenuOptions.includes('menu')) {
      document.getElementById('msg').style.opacity = '0';
      gameState = 'menu'; keys[e.code] = false; return;
    }
    if (e.code === 'Backspace') {
      document.getElementById('msg').style.opacity = '0';
      gameState = 'menu';
      keys[e.code] = false; return;
    }
  }
  if (e.code === 'KeyR' && (gameState === 'dead' || gameState === 'gameover')) resetLevel();
});
document.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

/* ============================================
 * 碰撞检测
 * ============================================ */
function rectCollide(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function collectCoin(coin) {
  const idx = COINS.indexOf(coin);
  if (idx >= 0) { COINS.splice(idx,1); coinsCollected++; }
}

/* ============================================
 * 粒子
 * ============================================ */
function spawnParticles(x, y, color, count) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*3;
    particles.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2, life:20+Math.random()*20, color});
  }
}

/* ============================================
 * 更新
 * ============================================ */
function update() {
  if (gameState === 'menu') return;
  if (gameState === 'win') { winTimer++; return; }
  if (gameState === 'dead') { deadTimer--; if (deadTimer<=0) respawn(); return; }
  if (gameState === 'gameover') return;

  /* ---- P1: 水平移动 ---- */
  player.vx = 0;
  if (keys['KeyA']) player.vx = -MOVE_SPEED;
  if (keys['KeyD']) player.vx = MOVE_SPEED;

  /* ---- P2: 跳跃 & 快速下落 ---- */
  if (keys['ArrowUp'] && player.onGround) {
    player.vy = JUMP_V;
    player.onGround = false;
    player.jumpsUsed = 1;
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#5bf', 6);
  }

  /* ---- P1: 二段跳（空中 + W 键） ---- */
  if (keys['KeyW'] && !player.onGround && player.jumpsUsed < player.maxJumps) {
    // 防止按住W连续触发
    keys['KeyW'] = false;
    player.vy = DOUBLE_JUMP_V;
    player.jumpsUsed++;
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#fff', 12);
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#fd0', 8);
  }

  /* ---- P2: 快速下落 ---- */
  if (keys['ArrowDown'] && !player.onGround) {
    player.vy += FAST_FALL;
  }

  /* ---- 物理 ---- */
  player.vy += GRAVITY;
  if (player.vy > 15) player.vy = 15;
  player.x += player.vx;
  player.y += player.vy;

  // 边界
  if (player.x < 0) player.x = 0;
  if (player.x > LEVEL_W - CHAR_W) player.x = LEVEL_W - CHAR_W;

  /* ---- 碰撞 ---- */
  player.onGround = false;
  const allSolids = [...GROUNDS, ...PLATFORMS];

  for (const s of allSolids) {
    if (!rectCollide(player, s)) continue;
    const pBottom = player.y + CHAR_H, pTop = player.y;
    const sBottom = s.y + s.h, sTop = s.y;
    const prevBottom = pBottom - player.vy, prevTop = pTop - player.vy;

    if (player.vy > 0 && prevBottom <= sTop + 2) { // 落在上面
      player.y = s.y - CHAR_H;
      player.vy = 0;
      player.onGround = true;
      player.jumpsUsed = 0;
    } else if (player.vy < 0 && prevTop >= sBottom - 2) { // 撞头
      player.y = s.y + s.h;
      player.vy = 0;
    } else if (player.vx > 0 && player.x + CHAR_W - player.vx <= s.x + 2) { // 右侧碰撞
      player.x = s.x - CHAR_W;
    } else if (player.vx < 0 && player.x - player.vx >= s.x + s.w - 2) { // 左侧碰撞
      player.x = s.x + s.w;
    }
  }

  /* ---- 尖刺 ---- */
  for (const s of SPIKES) {
    if (rectCollide(player, s)) die();
  }

  /* ---- 掉出屏幕 ---- */
  if (player.y > CANVAS_H + 80) die();

  /* ---- 金币 ---- */
  for (let i = COINS.length-1; i >= 0; i--) {
    const c = COINS[i];
    const cr = {x:c.x-8, y:c.y-8, w:16, h:16};
    if (rectCollide(player, cr)) { COINS.splice(i,1); coinsCollected++; }
  }

  /* ---- 终点旗帜 ---- */
  if (rectCollide(player, FLAG)) {
    gameState = 'win';
    winTimer = 0;
    // 胜利浮窗：1 秒后自动消失
    showMsg('🎉 完美配合！\n通关成功！', true, 1000);
    // 胜利菜单选项：第一关胜利有"下一关",第二关胜利只有"回首页"
    if (currentLevel < Object.keys(LEVELS).length) {
      winMenuOptions = ['next', 'menu'];
    } else {
      winMenuOptions = ['menu'];
    }
    winMenuSelection = 0;
  }

  /* ---- 相机 ---- */
  cameraX = player.x - CANVAS_W/3;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > LEVEL_W - CANVAS_W) cameraX = LEVEL_W - CANVAS_W;

  /* ---- 粒子 ---- */
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
    if (p.life <= 0) particles.splice(i,1);
  }

  /* ---- HUD ---- */
  document.getElementById('lives').textContent = lives;
  document.getElementById('coins').textContent = coinsCollected;
}

function die() {
  if (gameState !== 'playing') return;
  lives--; deaths++;
  if (lives <= 0) {
    gameState = 'gameover';
    showMsg('💀 生命耗尽！按 R 重试 / Backspace 回菜单', true, 4000);
  } else {
    gameState = 'dead';
    deadTimer = 40;
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#f44', 20);
  }
}

function respawn() {
  player.x = 60; player.y = GROUND_Y - CHAR_H;
  player.vx = 0; player.vy = 0;
  player.jumpsUsed = 0;
  gameState = 'playing';
}

function resetLevel() {
  // 用 loadLevel 重置当前关卡（不刷新页面，保留 LEVELS）
  loadLevel(currentLevel);
}

/* ============================================
 * 渲染
 * ============================================ */
function draw() {
  // HUD 显隐：menu / win 状态下隐藏
  const hudEl = document.getElementById('hud');
  if (hudEl) hudEl.style.display = (gameState === 'menu' || gameState === 'win') ? 'none' : 'flex';

  // ===== 关卡选择菜单 =====
  if (gameState === 'menu') {
    // 背景
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    // 标题
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px -apple-system';
    ctx.fillText('双人跑酷', CANVAS_W/2, 80);
    ctx.font = '14px -apple-system';
    ctx.fillStyle = '#aaa';
    ctx.fillText('考验默契 · 一人移动一人跳跃', CANVAS_W/2, 115);
    // 关卡选项
    const opts = [
      { id: 1, color: '#5bf', desc: '1500px · 1 坑 · 1 平台 · 1 尖刺' },
      { id: 2, color: '#fb5', desc: '2200px · 2 坑 · 5 平台 · 2 尖刺' },
    ];
    opts.forEach((o, i) => {
      const y = 180 + i * 100;
      const isSel = menuSelection === o.id;
      // 选中框
      if (isSel) {
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(CANVAS_W/2 - 280, y - 30, 560, 70);
        ctx.strokeStyle = o.color;
        ctx.lineWidth = 3;
        ctx.strokeRect(CANVAS_W/2 - 280, y - 30, 560, 70);
      }
      ctx.fillStyle = isSel ? o.color : '#888';
      ctx.font = isSel ? 'bold 22px -apple-system' : '20px -apple-system';
      ctx.textAlign = 'left';
      ctx.fillText('第 ' + o.id + ' 关', CANVAS_W/2 - 250, y);
      ctx.font = '13px -apple-system';
      ctx.fillText(o.desc, CANVAS_W/2 - 250, y + 22);
    });
    // 提示
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff0';
    ctx.font = '16px -apple-system';
    ctx.fillText('按 1 / 2 直接选关  ·  ↑↓ 切换  ·  Enter 进入', CANVAS_W/2, 400);
    ctx.fillStyle = '#888';
    ctx.font = '12px -apple-system';
    ctx.fillText('P1: A/D 移动 | W 二段跳  ·  P2: ↑ 跳 ↓ 快落  ·  组合: P1+2 冲刺', CANVAS_W/2, 440);
    ctx.textAlign = 'left';
    return;
  }

  ctx.save();
  ctx.translate(-cameraX, 0);


  /* ---- 天空渐变 ---- */
  const skyGrad = ctx.createLinearGradient(0,0,0,CANVAS_H);
  skyGrad.addColorStop(0,'#4a90d9'); skyGrad.addColorStop(0.6,'#87ceeb'); skyGrad.addColorStop(1,'#c8e6c0');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(cameraX, 0, CANVAS_W, CANVAS_H);

  /* ---- 远山 ---- */
  ctx.fillStyle = '#8bb87a';
  for (let x=cameraX-20; x<cameraX+CANVAS_W+40; x+=120) {
    ctx.beginPath(); ctx.moveTo(x-40,GROUND_Y); ctx.lineTo(x+20,GROUND_Y-50); ctx.lineTo(x+80,GROUND_Y); ctx.fill();
  }

  /* ---- 地面 ---- */
  for (const g of GROUNDS) {
    ctx.fillStyle = '#6b8e23'; ctx.fillRect(g.x, g.y, g.w, g.h);
    ctx.fillStyle = '#556b2f'; ctx.fillRect(g.x, g.y, g.w, 8);
  }

  /* ---- 平台 ---- */
  for (const p of PLATFORMS) {
    ctx.fillStyle = '#a0522d'; ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#8b4513'; ctx.fillRect(p.x, p.y, p.w, 4);
    ctx.fillStyle = '#cd853f'; ctx.fillRect(p.x, p.y+4, p.w, 4);
  }

  /* ---- 尖刺 ---- */
  for (const s of SPIKES) {
    ctx.fillStyle = '#e44';
    // 步长 20，w=40 时画 2 颗齿（原来 16 步长画 3 颗）
    for (let sx = s.x; sx < s.x+s.w; sx += 20) {
      ctx.beginPath(); ctx.moveTo(sx, s.y+s.h); ctx.lineTo(sx+10, s.y); ctx.lineTo(sx+20, s.y+s.h); ctx.fill();
    }
  }

  /* ---- 金币 ---- */
  for (const c of COINS) {
    const bob = Math.sin(Date.now()/300 + c.x) * 2;
    ctx.fillStyle = '#fd0'; ctx.beginPath(); ctx.arc(c.x, c.y+bob, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff8'; ctx.beginPath(); ctx.arc(c.x-2, c.y-1+bob, 3, 0, Math.PI*2); ctx.fill();
  }

  /* ---- 终点旗帜 ---- */
  ctx.fillStyle = '#ffd700'; ctx.fillRect(FLAG.x, FLAG.y+Math.sin(Date.now()/400)*4, FLAG.w, FLAG.h);
  ctx.fillStyle = '#fff'; ctx.fillRect(FLAG.x+2, FLAG.y+4, FLAG.w-4, 12);
  ctx.fillStyle = '#f00'; ctx.fillRect(FLAG.x+2, FLAG.y+16, FLAG.w-4, 12);

  /* ---- 角色 ---- */
  if (gameState !== 'dead' || Math.floor(deadTimer/4)%2 === 0) {
    const p = player;
    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(p.x+2, p.y+CHAR_H-2, CHAR_W-4, 4);
    // 身体
    const bodyGrad = ctx.createLinearGradient(p.x, p.y, p.x+CHAR_W, p.y);
    bodyGrad.addColorStop(0,'#5b9ee0'); bodyGrad.addColorStop(1,'#3b7ec0');
    ctx.fillStyle = bodyGrad; ctx.fillRect(p.x+2, p.y+10, CHAR_W-4, CHAR_H-12);
    // 头
    ctx.fillStyle = '#ffe4c8'; ctx.fillRect(p.x+4, p.y, CHAR_W-8, 14);
    // 帽子
    ctx.fillStyle = '#e44'; ctx.fillRect(p.x+2, p.y-2, CHAR_W-4, 6);
    // 眼睛
    ctx.fillStyle = '#000'; ctx.fillRect(p.x+CHAR_W-12, p.y+4, 3, 3);
    // 腿
    ctx.fillStyle = '#334'; ctx.fillRect(p.x+4, p.y+CHAR_H-8, 8, 8); ctx.fillRect(p.x+CHAR_W-12, p.y+CHAR_H-8, 8, 8);
    // 空中跳跃特效
    if (!p.onGround && p.jumpsUsed >= 2) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(p.x+CHAR_W/2, p.y+CHAR_H/2, CHAR_W*0.9, 0, Math.PI*2); ctx.fill();
    }
    if (!p.onGround && p.jumpsUsed >= 1) {
      ctx.fillStyle = 'rgba(100,180,255,0.25)';
      ctx.beginPath(); ctx.arc(p.x+CHAR_W/2, p.y+CHAR_H, 20, 0, Math.PI*2); ctx.fill();
    }
  }

  /* ---- 粒子 ---- */
  for (const p of particles) {
    ctx.fillStyle = p.color; ctx.globalAlpha = p.life/40;
    ctx.fillRect(p.x-cameraX-2, p.y-2, 4, 4);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  /* ---- HUD 跳跃状态 ---- */
  ctx.fillStyle = '#fff'; ctx.font = '13px -apple-system';
  ctx.fillText('跳跃: ' + (player.jumpsUsed) + '/' + (player.maxJumps-1), CANVAS_W-120, 24);

  /* ---- 胜利菜单 ---- */
  if (gameState === 'win') {
    // 半透明黑底
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    // 标题
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fd0';
    ctx.font = 'bold 36px -apple-system';
    ctx.fillText('🎉 通关成功！', CANVAS_W/2, 150);
    ctx.fillStyle = '#fff';
    ctx.font = '16px -apple-system';
    ctx.fillText('第 ' + currentLevel + ' 关 · ' + LEVELS[currentLevel].name, CANVAS_W/2, 185);
    // 选项
    const labels = { next: '下一关 →', menu: '回首页' };
    const optW = 240, optH = 56, gap = 20;
    const totalW = optW * winMenuOptions.length + gap * (winMenuOptions.length - 1);
    const startX = (CANVAS_W - totalW) / 2;
    winMenuOptions.forEach((act, i) => {
      const x = startX + i * (optW + gap);
      const y = 260;
      const isSel = winMenuSelection === i;
      // 选中框
      if (isSel) {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(x, y, optW, optH);
        ctx.strokeStyle = '#fd0';
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, optW, optH);
      } else {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, optW, optH);
      }
      ctx.fillStyle = isSel ? '#fd0' : '#fff';
      ctx.font = isSel ? 'bold 22px -apple-system' : '20px -apple-system';
      ctx.textAlign = 'center';
      ctx.fillText(labels[act], x + optW/2, y + 36);
    });
    // 提示
    ctx.fillStyle = '#aaa';
    ctx.font = '13px -apple-system';
    ctx.fillText('↑↓ 切换  ·  Enter 确认  ·  Backspace 回首页', CANVAS_W/2, 380);
    ctx.textAlign = 'left';
  }
}

/* ============================================
 * 消息
 * ============================================ */
let msgTimeout;
function showMsg(text, autoHide=true, duration=2000) {
  const el = document.getElementById('msg');
  el.innerHTML = text.replace(/\n/g, '<br>');
  el.style.opacity = '1';
  if (autoHide) { clearTimeout(msgTimeout); msgTimeout = setTimeout(() => el.style.opacity = '0', duration); }
}

/* ============================================
 * 循环
 * ============================================ */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
